<!DOCTYPE html>
<html>
    <head>
        <title>Valorant API</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="SMS_Val.css">    
    </head>

    <body class="bg-slate-950 text-white overflow-hidden h-screen flex flex-col">
        <!--Map Info-->
        <header class="p-6 flex justify-between items-start">
            <div class="bg-black/40 p-4 border-l-4 border-white">
                <h1 class="text-xl font-bold italic uppercase tracking-tighter">Abyss</h1>
                <p class="text-xs text-gray-400">STANDARD - CUSTOM</p>
            </div>
        </header>

        <!--AGENT SELECTION-->
        <main class="flex flex-1 px-10 gap-10">
            <section class="w-1/4 flex flex-col">
                <!--Agent roles-->
                <div id="agent-role" class="grid grid-cols-5 gap-2 overflow-y-auto pr-2">
                    <div class="aspect-square bg-slate-800 border border-slate-700hover:border-white cursor-pointer">
                        <!--Agent role icons-->
                    </div>
                </div>

                <!--Search bar-->
                <input type="text" placeholder="Search agent..." 
                   class="bg-slate-900/80 border border-slate-700 p-2 mb-4 text-sm focus:outline-none focus:border-red-500">
                
                   <!--Agent selection-->
                <div id="agent-list" class="grid grid-cols-4 gap-2 overflow-y-auto pr-2 custom-scrollbar">
                    <div class="aspect-square bg-slate-800 border border-slate-700 hover:border-white cursor-pointer">
                        <!--Agent Icons-->
                    </div>
                </div>
            </section>

            <!--AGENT ABILITIES-->
            <section class="flex-1 relative flex flex-col justify-center">
                
                <!--Agent Display-->
                <div id="agent-visual" class="absolute inset-0 -z-10 flex justify-center items-center">
                    <img id="main-portrait" src="" class="h-full object-contain opacity-80" alt="">
                </div>

                <div class="max-w-md ml-auto text-right">
                    <p id="agent-role" class="text-red-500 font-bold uppercase tracking-widest text-sm"></p>
                    <h2 id="agent-name" class="text-8xl font-black uppercase italic tracking-tighter mb-6"></h2>
                    
                    <!--Agent Abilities-->
                    <div class="bg-black/20 p-6 backdrop-blur-sm border-r-4 border-red-500">
                        <h3 class="text-gray-400 uppercase text-xs font-bold mb-4">Abilities</h3>
                        <div id="abilities-container" class="flex justify-end gap-4">
                            </div>
                    </div>
                </div>

                <div class="mt-10 flex justify-center">
                    <button class="bg-red-600 hover:bg-red-500 px-16 py-3 font-bold uppercase italic tracking-widest transition-colors">
                        Lock In
                    </button>
                </div>
            </section>
        </main>

    </body>
</html>
